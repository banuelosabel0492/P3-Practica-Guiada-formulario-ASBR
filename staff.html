   <div style="margin-top: 20px; padding: 20px; background-color: #f1f1f1; border-radius: 8px; border-left: 5px solid #b3ecff;">
        <h2>STAFF especialisado</h2>
      <div>
    <label>Paciente ID:</label>
    <input type="text" name="paciente_id" required>
</div>
<div>
    <label>Fecha y Hora:</label>
    <input type="text" name="fecha_hora" required>
</div>
<div>
    <label>Médico Asignado:</label>
    <input type="text" name="medico_asignado" required>
</div>
<div>
    <label>Presión Arterial:</label>
    <input type="text" name="presion_arterial" required>
</div>
<div>
    <label>Frecuencia Cardíaca:</label>
    <input type="text" name="frecuencia_cardiaca" required>
</div>
<div>
    <label>Saturación de Oxígeno:</label>
    <input type="text" name="saturacion_oxigeno" required>
</div>
<div>
    <label>Peso (KG):</label>
    <input type="number" step="0.1" name="peso_kg" required>
</div>
<div>
    <label>Temperatura (°C):</label>
    <input type="number" step="0.1" name="temperatura_c" required>
</div>
<div>
    <label>Motivo de Consulta:</label>
    <input type="text" name="motivo_consulta" required>
</div>
<div>
    <label>Padecimiento Actual:</label>
    <input type="text" name="padecimiento_actual" required>
</div>
<div>
    <label>Diagnóstico:</label>
    <input type="text" name="diagnostico" required>
</div>
<div>
    <label>Medicamento:</label>
    <input type="text" name="medicamento" required>
</div>
<div>
    <label>Dosis:</label>
    <input type="text" name="dosis" required>
</div>
<div>
    <label>Frecuencia:</label>
    <input type="text" name="frecuencia" required>
</div>
<div>
    <label>Duración:</label>
    <input type="text" name="duracion" required>
</div>
<div>
    <label>Estudios Solicitados:</label>
    <input type="text" name="estudios_solicitados" required>
</div>
<div>
    <label>Resultados Adjuntos:</label>
    <input type="text" name="resultados_adjuntos" required>
</div>
<div>
    <label>Nota Extra:</label>
    <input type="text" name="nota_extra" required>
</div>
<div>
    <label>Alergias:</label>
    <input type="text" name="alergias" required>
</div>
<div>
      <button type="submit" class="btn-submit">Guardar</button>
</div>
    </div>
